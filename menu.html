<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EZCalendar Chat</title>
    <link rel="stylesheet" href="menu.css">
  </head>
  <body>
    <div class="chat">
      <div class="chat-header">
        <div class="chat-title">
          <div class="status-dot"></div>
          EZCalendar
        </div>
        <div class="chat-actions">
          <div id="settingsContainer">
            <button id="settingsBtn">
              <img src="settings-icon.svg" alt="Settings">
            </button>
            <div id="settingsDropdown" class="hidden">
              <div id="settingsMenu">
                <!-- Settings content will be loaded dynamically -->
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="messages" id="messages">
        <div class="message bot">
          <div class="avatar">EZ</div>
          <div class="bubble">Hi! Tell me what to schedule and I'll draft an event.
            <span class="timestamp">Say things like: "Lunch with Sam next Tue at noon"</span>
          </div>
        </div>
      </div>
      <form class="composer" id="composer" autocomplete="off">
        <textarea id="input" class="input" placeholder="Type a message..." rows="1"></textarea>
        <button id="sendBtn" class="send-btn" type="submit">Send</button>
      </form>
    </div>
    <script src="script.js"></script>
  </body>
</html>
